<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA X ROOT KEY</title>

<style>

body{
background:#0d1117;
font-family:sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#161b22;
padding:40px;
border-radius:15px;
width:420px;
text-align:center;
border:2px solid #ff3c3c;
}

.logo{
font-size:26px;
color:#ff3c3c;
margin-bottom:20px;
font-weight:bold;
}

.key{
background:black;
border:2px solid #333;
padding:20px;
border-radius:10px;
font-family:monospace;
font-size:18px;
margin-bottom:20px;
cursor:pointer;
}

button{
padding:15px;
width:100%;
border:none;
border-radius:25px;
background:#ff3c3c;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.status{
margin-top:15px;
font-size:13px;
color:#ffaa00;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">🔥 NOVA KEY SYSTEM</div>

<div id="keyBox" class="key">
Click Generate Key
</div>

<button onclick="generate()">GENERATE KEY</button>

<div class="status" id="status"></div>

</div>

<script>

const API="83bdbdcd334319be55c53b1ec5f8b41e5fa8005e";

const RETURN_URL="https://pawanmaurya7291-max.github.io/Getkey/?done=1";

function generate(){

document.getElementById("status").innerText="Creating short link...";

let apiLink = `https://earnlinks.in/api?api=${API}&url=${encodeURIComponent(RETURN_URL)}&format=text`;

fetch(apiLink)
.then(res=>res.text())
.then(shortUrl=>{

if(shortUrl.startsWith("http")){

window.location.href = shortUrl;

}else{

document.getElementById("status").innerText="API Error";

}

});

}



function randomKey(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let p1="",p2="";

for(let i=0;i<4;i++){

p1+=chars[Math.floor(Math.random()*chars.length)];
p2+=chars[Math.floor(Math.random()*chars.length)];

}

return "NOVA-"+p1+"-"+p2+"-"+Date.now().toString().slice(-4);

}



function showKey(){

let key=randomKey();

document.getElementById("keyBox").innerText=key;

navigator.clipboard.writeText(key);

document.getElementById("status").innerText="Key Copied • Expire in 5 sec";

expire();

}



function expire(){

let t=5;

let timer=setInterval(()=>{

t--;

document.getElementById("status").innerText="Expire in "+t+" sec";

if(t<=0){

clearInterval(timer);

document.body.innerHTML="<h2 style='color:red;text-align:center'>KEY EXPIRED</h2>";

}

},1000);

}



function checkReturn(){

const params=new URLSearchParams(window.location.search);

if(params.get("done")=="1"){

showKey();

}

}

checkReturn();

</script>

</body>
</html>
