<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA X ROOT - KEY</title>

<style>

body{
background:#0f0f0f;
font-family:sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#151515;
padding:40px;
border-radius:15px;
border:2px solid #ff3c3c;
text-align:center;
width:420px;
}

.logo{
font-size:26px;
color:#ff3c3c;
margin-bottom:20px;
font-weight:bold;
}

.key{
background:black;
border:2px solid #333;
padding:20px;
border-radius:10px;
font-size:18px;
font-family:monospace;
margin-bottom:20px;
cursor:pointer;
}

button{
padding:15px;
width:100%;
border:none;
border-radius:25px;
background:#ff3c3c;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.status{
margin-top:15px;
font-size:13px;
color:#ffaa00;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">🔥 NOVA X ROOT</div>

<div class="key" id="keyBox">
🔒 Click Generate Key
</div>

<button onclick="generate()">GENERATE KEY</button>

<div class="status" id="status"></div>

</div>

<script>

const API="83bdbdcd334319be55c53b1ec5f8b41e5fa8005e";

const RETURN_URL="https://pawanmaurya7291-max.github.io/Getkey/?done=1";

function randomKey(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let k1="",k2="";

for(let i=0;i<4;i++){

k1+=chars[Math.floor(Math.random()*chars.length)];
k2+=chars[Math.floor(Math.random()*chars.length)];

}

return "NOVA-"+k1+"-"+k2+"-"+Date.now().toString().slice(-4);

}

function generate(){

document.getElementById("status").innerHTML="Opening shortner...";

const short="https://earnlinks.in/api?api="+API+"&url="+encodeURIComponent(RETURN_URL);

window.open(short,"_blank");

}

function showKey(){

const key=randomKey();

document.getElementById("keyBox").innerHTML=key;

navigator.clipboard.writeText(key);

document.getElementById("status").innerHTML="✅ Key copied automatically";

expire();

}

function expire(){

let time=5;

const timer=setInterval(()=>{

document.getElementById("status").innerHTML="Page expire in "+time+" sec";

time--;

if(time<0){

clearInterval(timer);

document.body.innerHTML="<h2 style='color:red;text-align:center'>KEY EXPIRED</h2>";

}

},1000);

}

function check(){

const params=new URLSearchParams(window.location.search);

if(params.get("done")=="1"){

showKey();

}

}

check();

</script>

</body>

</html>
