<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA X ROOT - Get Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(20, 20, 24, 0.95);
            border: 2px solid #e63c3c;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px rgba(230, 60, 60, 0.3);
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .key-box {
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #00ff64;
            letter-spacing: 2px;
            user-select: all;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .key-box:hover {
            border-color: #e63c3c;
            box-shadow: 0 0 15px rgba(230, 60, 60, 0.2);
        }
        
        .btn {
            background: linear-gradient(45deg, #e63c3c, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(230, 60, 60, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .info {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
        }
        
        .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff64;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .features {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        
        .features li {
            list-style: none;
            padding: 5px 0;
            color: #aaa;
            font-size: 13px;
        }
        
        .features li::before {
            content: "✓ ";
            color: #00ff64;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔥 NOVA X ROOT</div>
        <div class="subtitle">Free Fire Max Mod Menu</div>
        
        <div class="status"></div>
        <span style="color: #00ff64; font-size: 12px;">SERVER ONLINE</span>
        
        <ul class="features">
            <li>Aimbot + Silent Aim</li>
            <li>ESP Box / Line / Health</li>
            <li>Sniper Fast Switch</li>
            <li>Speed Hack</li>
            <li>Anti-Ban Bypass</li>
        </ul>
        
        <div class="key-box" id="keyDisplay" onclick="copyKey()">
            URF_NOVA-XXXX-XXXX
        </div>
        
        <button class="btn" onclick="generateKey()">🎲 GENERATE KEY</button>
        
        <div class="info">
            Key expires in 24 hours<br>
            One key per device allowed
        </div>
    </div>

    <script>
        function generateKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let part1 = '';
            let part2 = '';
            
            for(let i = 0; i < 4; i++) {
                part1 += chars.charAt(Math.floor(Math.random() * chars.length));
                part2 += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            const key = `URF_NOVA-${part1}-${part2}`;
            document.getElementById('keyDisplay').textContent = key;
            
            // Visual feedback
            const btn = document.querySelector('.btn');
            btn.textContent = '✓ KEY GENERATED';
            btn.style.background = '#00ff64';
            
            setTimeout(() => {
                btn.textContent = '🎲 GENERATE KEY';
                btn.style.background = '';
            }, 2000);
        }
        
        function copyKey() {
            const keyText = document.getElementById('keyDisplay').textContent;
            navigator.clipboard.writeText(keyText).then(() => {
                const keyBox = document.getElementById('keyDisplay');
                const original = keyBox.textContent;
                keyBox.textContent = '✓ COPIED!';
                keyBox.style.color = '#00ff64';
                
                setTimeout(() => {
                    keyBox.textContent = original;
                    keyBox.style.color = '#00ff64';
                }, 1000);
            });
        }
        
        // Auto generate on load
        window.onload = generateKey;
    </script>
</body>
</html>
