<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Temporary Registration Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="box" id="messageBox">
        <h1 id="title">✅ Registration Successful!</h1>
        <p id="message">आपका डिवाइस सफलतापूर्वक रजिस्टर हो रहा है...</p>
        <div class="loader" id="loader"></div>
        <p style="font-size: 14px; margin-top: 20px;">कृपया प्रतीक्षा करें, यह पेज अपने आप बंद हो जाएगा।</p>
    </div>

    <script>
        (function() {
            // URL से token लें
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            // Function to show error
            function showError(title, message) {
                document.getElementById('title').innerHTML = title;
                document.getElementById('message').innerHTML = message;
                document.getElementById('messageBox').classList.add('error');
                document.getElementById('loader').style.display = 'none';
                document.body.style.background = "linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)";
            }
            
            // Check if token exists
            if (!token) {
                showError('❌ Invalid Request', 'No token provided. Please generate a new SHOTNER link.');
                return;
            }
            
            // Notify main page (opener) that token is being used
            if (window.opener) {
                // Send token to main page for validation
                window.opener.postMessage({
                    type: 'VALIDATE_TOKEN',
                    token: token
                }, '*');
                
                // Wait for response from main page
                let responded = false;
                
                const messageHandler = function(event) {
                    if (event.data.type === 'TOKEN_VALID' && event.data.token === token) {
                        responded = true;
                        // Token is valid - register device
                        window.opener.postMessage({
                            type: 'REGISTER_DEVICE',
                            token: token
                        }, '*');
                        
                        // Show success
                        document.getElementById('title').innerHTML = '✅ Registration Successful!';
                        document.getElementById('message').innerHTML = 'आपका डिवाइस रजिस्टर हो गया है।';
                        
                        // Close after 2 seconds
                        setTimeout(() => window.close(), 2000);
                        
                        window.removeEventListener('message', messageHandler);
                    }
                    else if (event.data.type === 'TOKEN_INVALID' && event.data.token === token) {
                        responded = true;
                        showError('❌ Invalid Link', 'यह लिंक पहले ही यूज़ हो चुका है या एक्सपायर हो गया है। कृपया नया लिंक जनरेट करें।');
                        window.removeEventListener('message', messageHandler);
                    }
                };
                
                window.addEventListener('message', messageHandler);
                
                // Timeout if no response
                setTimeout(() => {
                    if (!responded) {
                        showError('❌ Connection Error', 'Main page से कनेक्ट नहीं हो पाया। कृपया पुनः प्रयास करें।');
                    }
                }, 5000);
                
            } else {
                showError('❌ Access Denied', 'यह पेज केवल SHOTNER के माध्यम से खोला जा सकता है।');
            }
        })();
    </script>
</body>
</html>
